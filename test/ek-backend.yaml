# yaml-language-server: $schema=https://spec.openapis.org/oas/3.1/schema/2021-09-28
openapi: 3.1.0
info:
  title: EK Backend API
  version: 1.0.17
  description: API dokumentáció az EK Backend szolgáltatáshoz
servers:
  - url: http://localhost:8080
    description: Fejlesztői szerver
tags:
  - name: atvevo
    description: Átvevő/ügyfél adatok lekérdezése
  - name: beallitas
    description: Felhasználói beállítások kezelése
  - name: deprecated
    description: Elavult endpointok (fejlesztés alatt ideiglenesen elérhető)
  - name: kalkulacio
    description: Kalkulációs elemek kezelése
  - name: keszlet
    description: Készlet adatok lekérdezése
  - name: kodtabla
    description: Kódtábla kezelés
  - name: projekt
    description: Projekt és Lead kezelés
  - name: terveszkoz
    description: Terv eszköz kezelés
  - name: topologia
    description: Topológia kezelés
  - name: topologiaelem-terveszkoz-lista
    description: Topológia elemek terv eszköz listájának kezelése
  - name: ugyfel
    description: Ügyfél kezelés
paths:
  /atvevo:
    get:
      tags:
        - atvevo
      summary: Átvevő keresés (lapozással)
      description: Átvevők keresése több mezőben (sERPaUgyfelKod, sERPaUgyfelNev, Adoszam alapján) lapozással
      operationId: searchAtvevo
      parameters:
        - name: kereses
          in: query
          description: Keresési kifejezés (keres a kódban, névben és adószámban)
          required: true
          schema:
            type: string
            minLength: 3
        - name: page
          in: query
          description: Oldalszám (1-től kezdődik)
          required: true
          schema:
            type: integer
            minimum: 1
        - name: pageSize
          in: query
          description: Elemek száma oldalanként
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Sikeres keresés
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AtvevoPagedResponse'
        '400':
          description: Hibás kérés - kereses paraméter kötelező
        '500':
          description: Szerver hiba
  /atvevo/{serpaugyfelid}:
    get:
      tags:
        - atvevo
      summary: Átvevő lekérdezés azonosító alapján
      description: Egyedi átvevő/ügyfél lekérdezése sERP ügyfél azonosító alapján
      operationId: getAtvevo
      parameters:
        - name: serpaugyfelid
          in: path
          description: sERP ügyfél azonosító
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Sikeres lekérdezés
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Atvevo'
        '404':
          description: Nem található a megadott azonosítóval rendelkező átvevő
        '500':
          description: Szerver hiba
  /cikktorzs:
    get:
      tags:
        - deprecated
      summary: Cikktörzs változások lekérdezése (DEPRECATED)
      description: "DEPRECATED - Csak fejlesztés alatt ideiglenesen elérhető. Termék változások lekérdezése időbélyeg alapján."
      operationId: getCikktorzs
      deprecated: true
      parameters:
        - name: idobelyegTol
          in: query
          description: Időbélyeg kezdő értéke (idobelyeg > idobelyegTol szűrés, nagyobb mint). ISO 8601 formátum (pl. 2024-01-15T10:30:00+01:00)
          required: true
          schema:
            type: string
            format: date-time
        - name: valtozas
          in: query
          description: Változás típusok szűrése (vesszővel elválasztva, pl. A,M). Lehetséges értékek - A (add/hozzáadás), M (modify/módosítás), D (delete/törlés)
          required: false
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
              enum: [A, M, D]
      responses:
        '200':
          description: Sikeres szinkronizálás - cikktörzs rekordok létrehozva/frissítve
        '400':
          description: Hibás kérés - idobelyegTol paraméter kötelező és helyes formátumú kell legyen
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Az idobelyegTol paraméter kötelező"
        '500':
          description: Szerver hiba
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Belső szerverhiba történt"
  /gyariszam-valtozas:
    get:
      tags:
        - deprecated
      summary: Gyári szám változások szinkronizálása (DEPRECATED)
      description: "DEPRECATED - Csak fejlesztés alatt ideiglenesen elérhető. Terv eszközök gyári szám adatainak szinkronizálása egyedi eszköz változások alapján."
      operationId: getGyariSzamValtozas
      deprecated: true
      parameters:
        - name: idobelyegTol
          in: query
          description: Időbélyeg kezdő értéke (idobelyeg > idobelyegTol szűrés, nagyobb mint). ISO 8601 formátum (pl. 2024-01-15T10:30:00+01:00)
          required: true
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Sikeres szinkronizálás - terv eszközök gyári szám adatai frissítve
        '400':
          description: Hibás kérés - idobelyegTol paraméter kötelező és helyes formátumú kell legyen
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Az idobelyegTol paraméter kötelező"
        '500':
          description: Szerver hiba
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Belső szerverhiba történt"
  /lead-valtozas:
    get:
      tags:
        - deprecated
      summary: Lead változások szinkronizálása (DEPRECATED)
      description: "DEPRECATED - Csak fejlesztés alatt ideiglenesen elérhető. Lead módosítások szinkronizálása szerződés változások alapján."
      operationId: getLeadValtozas
      deprecated: true
      parameters:
        - name: idobelyegTol
          in: query
          description: Időbélyeg kezdő értéke (idobelyeg > idobelyegTol szűrés, nagyobb mint). ISO 8601 formátum (pl. 2024-01-15T10:30:00+01:00)
          required: true
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Sikeres szinkronizálás - lead rekordok frissítve
        '400':
          description: Hibás kérés - idobelyegTol paraméter kötelező és helyes formátumú kell legyen
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Az idobelyegTol paraméter kötelező"
        '500':
          description: Szerver hiba
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Belső szerverhiba történt"
  /projekt-valtozas:
    get:
      tags:
        - deprecated
      summary: Projekt változások szinkronizálása (DEPRECATED)
      description: "DEPRECATED - Csak fejlesztés alatt ideiglenesen elérhető. Projekt módosítások szinkronizálása projekt változások alapján."
      operationId: getProjektValtozas
      deprecated: true
      parameters:
        - name: idobelyegTol
          in: query
          description: Időbélyeg kezdő értéke (idobelyeg > idobelyegTol szűrés, nagyobb mint). ISO 8601 formátum (pl. 2024-01-15T10:30:00+01:00)
          required: true
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Sikeres szinkronizálás - projekt rekordok frissítve
        '400':
          description: Hibás kérés - idobelyegTol paraméter kötelező és helyes formátumú kell legyen
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Az idobelyegTol paraméter kötelező"
        '500':
          description: Szerver hiba
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Belső szerverhiba történt"
  /beallitas:
    get:
      tags:
        - beallitas
      summary: Felhasználói beállítások lekérdezése (lapozással)
      description: Felhasználói beállítások lekérdezése felhasználó és opcionálisan kulcs alapján
      operationId: getBeallitas
      parameters:
        - name: kulcs
          in: query
          description: Beállítás kulcs (opcionális szűrés)
          required: false
          schema:
            type: string
        - name: page
          in: query
          description: Oldalszám (1-től kezdődik)
          required: true
          schema:
            type: integer
            minimum: 1
        - name: pageSize
          in: query
          description: Elemek száma oldalanként
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Sikeres lekérdezés
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FelhasznaloBeallitasPagedResponse'
        '400':
          description: Hibás kérés - validációs hiba
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Validációs hiba"
        '500':
          description: Szerver hiba
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Belső szerverhiba történt"
    put:
      tags:
        - beallitas
      summary: Felhasználói beállítás upsert (létrehozás vagy frissítés)
      description: Felhasználói beállítás létrehozása vagy frissítése felhasználó és kulcs alapján (idempotent művelet)
      operationId: upsertBeallitas
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FelhasznaloBeallitasUpsert'
      responses:
        '200':
          description: Beállítás sikeresen létrehozva vagy frissítve (idempotent művelet)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FelhasznaloBeallitas'
        '400':
          description: Hibás kérés - validációs hiba
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Minden mező kötelező"
        '500':
          description: Szerver hiba
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Belső szerverhiba történt"
  /kalkulacio:
    get:
      tags:
        - kalkulacio
      summary: Kalkulációs elemek lekérdezése lead azonosítók alapján (lapozással)
      description: |
        Ügyfelek lekérdezése projektek, leadek és kalkulációs elemek beágyazásával lead azonosítók alapján.
        
        **Pagination stratégia:**
        - Ugyfel szint: DB-level pagination (max 100/page)
        - KalkulacioElem szint: Memory-level (ALL filtered elements for requested Leads)
        
        **Performance ajánlások:**
        - **Ajánlott:** max 5 beyeLeadId/request
        - **Maximum:** 10 beyeLeadId/request (API limit)
        - Használj szűrőket (gyarto, termekcsoport, stb.) a KalkulacioElem méret csökkentéséhez
      operationId: getKalkulacio
      parameters:
        - name: beyeLeadId
          in: query
          description: |
            Beye lead azonosítók vesszővel elválasztva (pl: 123,456,789)
            
            **Ajánlott maximum:** 5 lead ID
            **Technikai limit:** 10 lead ID
          required: true
          schema:
            type: array
            items:
              type: integer
              format: int32
            minItems: 1
            maxItems: 10
          style: form
          explode: false
        - name: beszerzesiForras
          in: query
          description: Beszerzési forrás szűrési feltétel
          required: false
          schema:
            type: string
        - name: excelParentHeaderId
          in: query
          description: Excel parent header ID szűrési feltétel
          required: false
          schema:
            type: string
        - name: excelRowType
          in: query
          description: Excel sor típus szűrési feltétel
          required: false
          schema:
            type: string
        - name: gyarto
          in: query
          description: Gyártó szűrési feltétel
          required: false
          schema:
            type: string
        - name: gyartoiCikkszam
          in: query
          description: Gyártói cikkszám szűrési feltétel
          required: false
          schema:
            type: string
        - name: megnevezes
          in: query
          description: Megnevezés szűrési feltétel
          required: false
          schema:
            type: string
        - name: pontosTipus
          in: query
          description: Pontos típus szűrési feltétel
          required: false
          schema:
            type: string
        - name: serpaCikkszam
          in: query
          description: SERPA cikkszám szűrési feltétel (Cikktörzs alapján)
          required: false
          schema:
            type: string
        - name: termekcsoport
          in: query
          description: Termékcsoport szűrési feltétel
          required: false
          schema:
            type: string
        - name: tervezettGyarto
          in: query
          description: Tervezett gyártó szűrési feltétel
          required: false
          schema:
            type: string
        - name: deviza
          in: query
          description: Deviza szűrési feltétel (ISO 3-betűs kód)
          required: false
          schema:
            type: string
        - name: includeParentRows
          in: query
          description: >
            Ha true, a válasz tartalmazza azokat a szülő elemeket is,
            amelyeknek van olyan gyerek eleme (excel_parent_header_id = szülő.excel_calculation_id kapcsolaton keresztül),
            amely megfelel a megadott szűrési feltételeknek.
            Default: false (csak a közvetlenül megfelelő elemek).
            FIGYELEM: A KalkulacioElem szűrés NINCS lapozva a hierarchián belül!
            Az aktuális oldal ÖSSZES Ugyfel-jéhez tartozó ÖSSZES szűrt KalkulacioElem
            egyszerre kerül lekérdezésre.
          required: false
          schema:
            type: boolean
            default: false
        - name: page
          in: query
          description: Oldalszám (1-től kezdődik)
          required: true
          schema:
            type: integer
            minimum: 1
        - name: pageSize
          in: query
          description: Elemek száma oldalanként
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Sikeres lekérdezés
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UgyfelWithProjektekAndKalkulacioPagedResponse'
        '400':
          description: Hibás kérés - validációs hiba
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "A beyeLeadIds paraméter kötelező és nem lehet üres"
        '500':
          description: Szerver hiba
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Belső szerverhiba történt"
  /kalkulacio/import:
    post:
      tags:
        - kalkulacio
      summary: Kalkulációs elemek importálása
      description: Kalkulációs elemek importálása Beye rendszerből lead azonosítók alapján
      operationId: importKalkulacio
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportKalkulacioRequest'
      responses:
        '201':
          description: Sikeres importálás
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UgyfelWithProjektek'
        '400':
          description: Hibás kérés - validációs hiba
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "A beyeLeadIds paraméter kötelező és nem lehet üres"
        '500':
          description: Szerver hiba
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Belső szerverhiba történt"
  /kalkulacioelem/{id}/blockmultiplier:
    get:
      tags:
        - kalkulacio
      summary: Kalkulációs elemhez (header sor) tartozó block multiplier lekérdezése
      description: Egy kalkulációs elemhez (header sor) tartozó block multiplier adatok lekérdezése
      operationId: getKalkulacioElemBlockMultiplier
      parameters:
        - name: id
          in: path
          description: Kalkulációs elem (header sor) egyedi azonosítója
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Sikeres lekérdezés
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KalkulacioElem'
        '404':
          description: Kalkulációs elem nem található
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Kalkulációs elem nem található a megadott azonosítóval"
        '500':
          description: Szerver hiba
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Belső szerverhiba történt"
  /kalkulacioelem/{id}/gyereksorok:
    get:
      tags:
        - kalkulacio
      summary: Kalkulációs elem header sorához tartozó gyerek sorok lekérdezése (lapozással)
      description: Egy kalkulációs elemhez (header sor) tartozó gyerek elemek lekérdezése lapozással, opcionális szűréssel excel sor típusra
      operationId: getKalkulacioElemGyereksorok
      parameters:
        - name: id
          in: path
          description: Kalkulációs elem (header sor) egyedi azonosítója - ez lesz az excelParentHeaderId a gyerek soroknál
          required: true
          schema:
            type: integer
            format: int64
        - name: excelRowType
          in: query
          description: Excel sor típus szűrési feltétel (több érték megadható)
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: page
          in: query
          description: Oldalszám (1-től kezdődik)
          required: true
          schema:
            type: integer
            minimum: 1
        - name: pageSize
          in: query
          description: Elemek száma oldalanként
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Sikeres lekérdezés
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KalkulacioElemPagedResponse'
        '404':
          description: Kalkulációs elem nem található
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Kalkulációs elem nem található a megadott azonosítóval"
        '500':
          description: Szerver hiba
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Belső szerverhiba történt"
  /kalkulacioelem/{id}/topologiaelemek:
    get:
      tags:
        - kalkulacio
      summary: Kalkulációs elemhez, mint header sorhoz tartozó topológia elemek lekérdezése
      description: Egy kalkulációs elemhez, mint header sorhoz tartozó topológiák és topológia elemek lekérdezése, opcionális szűréssel topológia elem helyiseg típusra
      operationId: getKalkulacioElemTopologiaElemek
      parameters:
        - name: id
          in: path
          description: Kalkulációs elem (header sor) egyedi azonosítója
          required: true
          schema:
            type: integer
            format: int64
        - name: topologiaElemhelyisegTipus
          in: query
          description: Topológia elem helyiseg típus szűrési feltétel
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Sikeres lekérdezés - kalkulációs elem topológiái kontextussal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KalkulacioElemTopologiakResponse'
        '404':
          description: Kalkulációs elem nem található
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Kalkulációs elem nem található a megadott azonosítóval"
        '500':
          description: Szerver hiba
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Belső szerverhiba történt"
  /kalkulacioelem/{id}/terveszkozok:
    post:
      tags:
        - kalkulacio
      summary: Terv eszközök létrehozása kalkulációs elem, mint header sor alapján
      description: Kalkulációs elemhez tartozó terv eszközök generálása
      operationId: createTervEszkozokFromKalkulacioElem
      parameters:
        - name: id
          in: path
          description: Kalkulációs elem (header sor) egyedi azonosítója
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        description: Terv eszközök létrehozási paraméterek
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTervEszkozokRequest'
      responses:
        '200':
          description: Terv eszközök sikeresen létrehozva
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TervEszkozokCreatedResponse'
        '400':
          description: Hibás kérés - validációs hiba
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Validációs hiba"
        '404':
          description: Kalkulációs elem nem található
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Kalkulációs elem nem található a megadott azonosítóval"
        '500':
          description: Szerver hiba
          content:
            application/json:
